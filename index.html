<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8"/>
        <title>我的测试站点</title>
    </head>
    <body>
        <h1>Hello World</h1>
        <p>这是我的页面</p>
        <strong>第一</strong><em>第二</em><em>第三</em>
        <p>第四</p>
        <p>第五</p>
        <p>第六</p>
        <p>A link to my<a href="https://www.baidu.com" title="baidu" target="_blank">
        favorite website</a>.</p>

        <!-- 使用 disabled 属性来防止终端用户输入文本到输入框中 -->
        <input type="text" disabled />

        <!-- 下面这个输入框不包含 disabled 属性，所以用户可以向其中输入 -->
        <input type="text" />

        <h2>一些字符实体引用</h2>
        <ol>
            <li>&lt;:&amp;lt;</li>
            <li>&gt;:&amp;gt;</li>
            <li>&quot;:&amp;quot;</li>
            <li>&apos;:&amp;apos;</li>
            <li>&amp;:&amp;amp;</li>
        </ol>
    </body>
</html>
