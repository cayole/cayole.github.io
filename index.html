<!DOCTYPE html>
<html lang="zh-CN"><!--设定语言-->
    <head>
        <meta charset="utf-8"/>
        <title>我的测试站点</title>
        <meta name="author" content="ylz"/>
        <meta name="description" content="to learn html"/>
        <link rel="icon" href="favicon.ico" type="image/x-icon"/>
        <link rel="stylesheet" href="css/my-css-file.css"/>
        <script src="scripts/my-js-file.js"defer></script>
        <!--最好加上 defer 以告诉浏览器在解析完成 HTML 后再加载 JavaScript-->

    </head>
    <body>
        <h1>Hello World</h1>
        <p>这是我的页面</p>
        <strong>第一</strong><em>第二</em><em>第三</em>
        <p>第四</p>
        <p>第五</p>
    <p>第六</p>
        <p>A link to my<a href="https://www.baidu.com" title="baidu" target="_blank">
        favorite website</a>.</p>

        <!-- 使用 disabled 属性来防止终端用户输入文本到输入框中 -->
        <input type="text" disabled />

        <!-- 下面这个输入框不包含 disabled 属性，所以用户可以向其中输入 -->
        <input type="text" />

        <h2>一些字符实体引用</h2>
        <ol>
            <li>&lt; : &amp;lt;</li>
            <li>&gt; : &amp;gt;</li>
            <li>&quot; : &amp;quot;</li>
            <li>&apos; : &amp;apos;</li>
            <li>&amp; : &amp;amp;</li>
        </ol>
        <p>Japanese example:<span lang:"ja">ご飯が熱い。</span>.</p>
        <!--可以分段设置语言-->
    </body>
</html>
